<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welpe – WurfKit</title>
<meta name="description" content="Digitales Welpen-Profil bei WurfKit – Stammbaum, Impfübersicht, Züchterkontakt.">
<meta name="robots" content="noindex,follow">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%90%BE%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--p:#2D6A4F;--pl:#52B788;--pp:#D8F3DC;--pd:#1B4332;--bg:#FAFAF7;--surf:#FFFFFF;--surf2:#F5F5F0;--t:#1A1A1A;--t2:#4A4A4A;--t3:#8A8A8A;--b:#E8E8E0}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;-webkit-font-smoothing:antialiased;font-size:15px;padding-bottom:2rem}
header{background:var(--surf);border-bottom:1px solid var(--b);padding:.85rem 1.25rem;display:flex;justify-content:space-between;align-items:center}
.lg{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:500;color:var(--t);text-decoration:none}
.lg b{color:var(--p);font-weight:600}
.bk{font-size:.78rem;color:var(--t3);padding:.4rem .9rem;border-radius:99px;border:1px solid var(--b);text-decoration:none}
.bk:hover{border-color:var(--p);color:var(--p)}
main{max-width:680px;margin:0 auto;padding:1.5rem 1.25rem}
.hero{text-align:center;margin-bottom:1.75rem}
.photo{width:200px;height:200px;border-radius:50%;background:linear-gradient(135deg,var(--pp),var(--pl));margin:0 auto 1rem;border:6px solid var(--surf);box-shadow:0 14px 40px rgba(45,106,79,.22);overflow:hidden;position:relative}
.photo img{width:100%;height:100%;object-fit:cover;display:block}
.photo .vdh{position:absolute;bottom:0;right:8px;background:linear-gradient(135deg,#52B788,#2D6A4F);color:#fff;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;font-size:11px;letter-spacing:.5px;border:3px solid #fff}
h1{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:500;letter-spacing:-.02em;margin-bottom:4px;color:var(--pd)}
.sub{font-size:1rem;color:var(--p);margin-bottom:6px;font-style:italic}
.meta{font-size:.88rem;color:var(--t2)}
.badges{display:inline-flex;gap:6px;margin-top:10px;flex-wrap:wrap;justify-content:center}
.bg{padding:4px 11px;border-radius:99px;font-size:.7rem;font-weight:600;letter-spacing:.3px}
.bg.ok{background:#DCFCE7;color:#15803D}
.bg.info{background:#DBEAFE;color:#1D4ED8}
.bg.muted{background:var(--surf2);color:var(--t3)}
.sec{background:var(--surf);border:1px solid var(--b);border-radius:14px;padding:1.4rem 1.5rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.sech{font-size:.7rem;font-weight:700;color:var(--t3);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:.85rem}
.kv{display:grid;grid-template-columns:140px 1fr;gap:.6rem 1rem;font-size:.92rem}
.kv b{color:var(--t3);font-weight:500}
.cta{text-align:center;margin-top:1.5rem;padding:1.5rem 1.25rem;background:linear-gradient(135deg,var(--pp),#EBF7EE);border-radius:14px}
.cta h2{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--pd);font-weight:500;margin-bottom:8px}
.cta p{color:var(--t2);font-size:.92rem;margin-bottom:1rem}
.btn{display:inline-flex;align-items:center;gap:8px;padding:.85rem 1.6rem;background:var(--p);color:#fff;border-radius:99px;font-weight:600;text-decoration:none;font-size:.92rem;transition:all .2s}
.btn:hover{background:var(--pd);transform:translateY(-1px);box-shadow:0 6px 18px rgba(45,106,79,.28)}
.disc{margin-top:1rem;padding:.85rem 1rem;background:#FEF3C7;border:1px solid #FDE68A;color:#78350F;border-radius:8px;font-size:.78rem;line-height:1.5;text-align:left}
.notfound{text-align:center;padding:3rem 1.5rem;color:var(--t3)}
.notfound h2{font-family:'Playfair Display',serif;color:var(--t);margin:1rem 0 .5rem;font-size:1.5rem}
@media(max-width:520px){
  .kv{grid-template-columns:120px 1fr;font-size:.85rem;gap:.5rem .8rem}
  h1{font-size:1.7rem}
  .photo{width:160px;height:160px}
}
</style>
</head>
<body>
<header>
  <a href="/" class="lg"><b>Wurf</b>Kit</a>
  <a href="/demo.html" class="bk">←&nbsp;Demo</a>
</header>
<main id="main">
<div class="notfound">
  <div style="font-size:64px">🐾</div>
  <h2>Lade Welpen-Profil…</h2>
</div>
</main>
<script>
// Mock puppy data — same as demo
const PUPPIES = {
  aaron:{name:'Aaron',full:'Aaron vom Waldberg',sex:'Rüde',color:'gold',mc:'276 098 106 345 001',weight:7.2,birth:'2026-01-12',breed:'Golden Retriever',img:'demo/img/aaron.jpg',status:'sold',buyer:'Familie Weber, Berlin'},
  ben:{name:'Ben',full:'Ben vom Waldberg',sex:'Rüde',color:'dunkelgold',mc:'276 098 106 345 002',weight:6.98,birth:'2026-01-12',breed:'Golden Retriever',img:'demo/img/ben.jpg',status:'reserved',buyer:'Familie Becker, Hamburg'},
  caro:{name:'Caro',full:'Caro vom Waldberg',sex:'Hündin',color:'gold',mc:'276 098 106 345 003',weight:6.72,birth:'2026-01-12',breed:'Golden Retriever',img:'demo/img/caro.jpg',status:'available',buyer:null},
  diego:{name:'Diego',full:'Diego vom Waldberg',sex:'Rüde',color:'hellgold',mc:'276 098 106 345 004',weight:7.11,birth:'2026-01-12',breed:'Golden Retriever',img:'demo/img/diego.jpg',status:'sold',buyer:'Familie Schäfer, Köln'},
  elsa:{name:'Elsa',full:'Elsa vom Waldberg',sex:'Hündin',color:'gold',mc:'276 098 106 345 005',weight:6.61,birth:'2026-01-12',breed:'Golden Retriever',img:'demo/img/elsa.jpg',status:'kept_by_breeder',buyer:null}
};
const STATUS_LBL = {
  available:{cls:'ok',l:'Verfügbar'},
  reserved:{cls:'info',l:'Reserviert'},
  sold:{cls:'muted',l:'Verkauft'},
  kept_by_breeder:{cls:'info',l:'Beim Züchter'}
};
const BREEDER = {
  name:'Maria Schmidt',
  kennel:'vom Waldberg',
  address:'Schwanthalerstraße 42, 80336 München',
  phone:'+49 89 12345678',
  email:'maria@vom-waldberg.de',
  verein:'Deutscher Retriever Club e.V. (DRC)'
};

function getId(){
  // Support both ?id=X and /welpe/X paths
  var qs = new URLSearchParams(location.search);
  if (qs.get('id')) return qs.get('id').toLowerCase();
  var m = location.pathname.match(/\/welpe\/([a-z0-9_-]+)\/?/i);
  if (m) return m[1].toLowerCase();
  return null;
}
function fmt(d){var x=new Date(d);return x.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});}
function fmtAge(d){
  var b=new Date(d), n=new Date();
  var w=Math.floor((n-b)/(7*864e5));
  if(w<8) return w+' Wochen';
  var m=(n.getFullYear()-b.getFullYear())*12+(n.getMonth()-b.getMonth());
  return m+' Mon.';
}

function render(){
  var id=getId(), p=id&&PUPPIES[id], main=document.getElementById('main');
  if(!p){
    main.innerHTML='<div class="notfound"><div style="font-size:64px">🐾</div><h2>Welpe nicht gefunden</h2><p>Diese Welpen-Seite ist Teil der WurfKit-Demo. Bitte überprüfen Sie den QR-Code.</p><a href="/demo.html" class="btn" style="margin-top:1rem">Zur Demo</a></div>';
    document.title='Welpe nicht gefunden – WurfKit';
    return;
  }
  document.title=p.full+' – WurfKit';
  var st=STATUS_LBL[p.status]||STATUS_LBL.available;
  main.innerHTML=
    '<div class="hero">'+
      '<div class="photo"><img src="'+p.img+'?v3" alt="'+p.full+'"/><div class="vdh">VDH</div></div>'+
      '<h1>'+p.name+'</h1>'+
      '<div class="sub">'+p.full+'</div>'+
      '<div class="meta">'+p.breed+' · '+p.sex+' · '+p.color+'</div>'+
      '<div class="badges"><span class="bg '+st.cls+'">'+st.l+'</span><span class="bg muted">geb. '+fmt(p.birth)+' · '+fmtAge(p.birth)+'</span></div>'+
    '</div>'+
    '<div class="sec"><div class="sech">Welpen-Daten</div>'+
      '<div class="kv">'+
        '<b>Mikrochip</b><span style="font-family:monospace;font-size:.85rem">'+p.mc+'</span>'+
        '<b>Geburtsdatum</b><span>'+fmt(p.birth)+'</span>'+
        '<b>Aktuelles Gewicht</b><span>'+p.weight.toFixed(2)+' kg</span>'+
        '<b>Rasse</b><span>'+p.breed+'</span>'+
        '<b>Geschlecht</b><span>'+p.sex+'</span>'+
        '<b>Fellfarbe</b><span>'+p.color+'</span>'+
      '</div>'+
    '</div>'+
    '<div class="sec"><div class="sech">Eltern</div>'+
      '<div class="kv">'+
        '<b>Mutter</b><span>Luna vom Waldberg<br><span style="color:var(--t3);font-size:.82rem">DRC 23-03421 · HD A1 · Formwert V</span></span>'+
        '<b>Vater</b><span>Apollo vom Sonnenhof<br><span style="color:var(--t3);font-size:.82rem">DRC 20-09876 · HD A1 · VDH-CH</span></span>'+
        '<b>Wurfgeschwister</b><span>4 (3 R / 2 H)</span>'+
        '<b>COI (Wurf)</b><span>2,34% (Rasse-Ø: 7,1%)</span>'+
      '</div>'+
    '</div>'+
    '<div class="sec"><div class="sech">Impfungen (StIKo Vet 2025)</div>'+
      '<div class="kv">'+
        '<b>SHP + Lepto</b><span>'+fmt(addDays(p.birth,56))+' (8 Wochen)</span>'+
        '<b>SHP + Lepto + Tollwut</b><span>'+fmt(addDays(p.birth,84))+' (12 Wochen)</span>'+
        '<b>Nächste Impfung</b><span style="color:var(--p);font-weight:600">'+fmt(addDays(p.birth,112))+' (16 Wochen)</span>'+
      '</div>'+
    '</div>'+
    '<div class="sec"><div class="sech">Züchter-Kontakt</div>'+
      '<div class="kv">'+
        '<b>Name</b><span>'+BREEDER.name+'</span>'+
        '<b>Zwinger</b><span>'+BREEDER.kennel+'</span>'+
        '<b>Anschrift</b><span>'+BREEDER.address+'</span>'+
        '<b>Telefon</b><span><a href="tel:'+BREEDER.phone.replace(/\s/g,'')+'" style="color:var(--p);text-decoration:none">'+BREEDER.phone+'</a></span>'+
        '<b>E-Mail</b><span><a href="mailto:'+BREEDER.email+'" style="color:var(--p);text-decoration:none">'+BREEDER.email+'</a></span>'+
        '<b>Verein</b><span>'+BREEDER.verein+'</span>'+
      '</div>'+
    '</div>'+
    '<div class="cta">'+
      '<h2>Erstellt mit WurfKit</h2>'+
      '<p>Die App, mit der VDH-Züchter ihre Welpen-Unterlagen in Minuten generieren.</p>'+
      '<a href="/" class="btn">Mehr erfahren →</a>'+
    '</div>'+
    '<div class="disc"><b>Hinweis:</b> Dies ist eine Demo-Seite. Maria Schmidt &laquo;vom Waldberg&raquo; und alle hier genannten Welpen sind erfunden. In der echten App wird jedem Käufer ein dauerhafter Link zum Welpen-Profil bereitgestellt.</div>';
}
function addDays(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x.toISOString().split('T')[0];}

render();
</script>
</body>
</html>
